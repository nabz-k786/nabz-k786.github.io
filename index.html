<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0"/>
<title>Ria &amp; Arjun's Number Adventure — Integer Multiplication</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --g:#2E7D32;--gl:#4CAF50;--gx:#E8F5E9;--gd:#1B5E20;
  --c:#C62828;--cx:#FFEBEE;
  --p:#6A1B9A;--px:#F3E5F5;--pl:#AB47BC;
  --a:#E65100;--ax:#FFF3E0;
  --go:#F9A825;--gox:#FFFDE7;
  --b:#1565C0;--bx:#E3F2FD;
  --bg:#FAFAF7;--wh:#fff;--dk:#1A1A1A;--md:#424242;--mu:#757575;--br:#E0E0E0;
  --r:14px;--rs:8px;--f:'Nunito',sans-serif
}
html,body{height:100%;width:100%;background:#1a1a2e;font-family:var(--f);display:flex;align-items:center;justify-content:center;overflow:hidden}
#app{width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.phone{width:390px;height:700px;background:var(--bg);border-radius:32px;overflow:hidden;position:relative;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 8px #2a2a3e;display:flex;flex-direction:column}
#scr{display:flex;flex-direction:column;flex:1;overflow:hidden;background:var(--bg);position:absolute;inset:0}
.nav{display:flex;align-items:center;justify-content:space-between;padding:12px 14px 7px;background:var(--wh);border-bottom:1px solid var(--br);flex-shrink:0}
.ntl{font-size:13px;font-weight:800;color:var(--dk)}
.nbdg{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;background:var(--gx);color:var(--gd)}
.pbw{padding:4px 14px 0;flex-shrink:0}
.pb{height:4px;background:var(--br);border-radius:2px}
.pbf{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--gl));transition:width .4s}
.pbl{font-size:9px;font-weight:700;color:var(--mu);text-align:right}
.scroll{flex:1;overflow-y:auto;padding:12px;-ms-overflow-style:none;scrollbar-width:none}
.scroll::-webkit-scrollbar{display:none}
.bbar{padding:10px 14px;background:var(--wh);border-top:1px solid var(--br);flex-shrink:0}
.card{background:var(--wh);border-radius:var(--r);padding:13px;margin-bottom:10px;border:1.5px solid var(--br)}
.gn{background:var(--gx);border-color:#A5D6A7}.co{background:var(--cx);border-color:#FFAB91}
.pu{background:var(--px);border-color:#CE93D8}.am{background:var(--ax);border-color:#FFCC80}
.bl{background:var(--bx);border-color:#90CAF9}
.btn{border:none;border-radius:var(--r);font-family:var(--f);font-weight:800;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;justify-content:center;gap:5px}
.btn:active{transform:scale(.96)}
.btnp{background:var(--g);color:#fff;padding:12px 22px;font-size:14px;width:100%}
.btnp:hover{background:var(--gd)}
.btnco{background:var(--c);color:#fff;padding:12px 22px;font-size:14px;width:100%}
.btnpu{background:var(--p);color:#fff;padding:12px 22px;font-size:14px;width:100%}
.btns{background:var(--wh);color:var(--dk);border:2px solid var(--br);padding:8px 14px;font-size:12px}
.btnsm{padding:6px 12px;font-size:11px;border-radius:var(--rs)}
.pls{animation:pls 1.5s infinite}
.char-row{display:flex;justify-content:space-around;align-items:flex-end;padding:6px 16px}
.char{display:flex;flex-direction:column;align-items:center;gap:3px}
.cb{width:62px;height:82px;border-radius:50% 50% 40% 40%;display:flex;align-items:center;justify-content:center;font-size:28px}
.ria{background:linear-gradient(160deg,#4CAF50,#2E7D32)}
.arjun{background:linear-gradient(160deg,#42A5F5,#1565C0)}
.cl{font-size:11px;font-weight:800;color:var(--md)}
.bubs{display:flex;flex-direction:column;gap:7px;padding:0 10px}
.bub{padding:9px 12px;border-radius:16px;font-size:12px;font-weight:600;line-height:1.45;max-width:86%;animation:pop .2s ease}
.bub.ria{background:var(--gx);border:1.5px solid #A5D6A7;color:var(--gd);align-self:flex-end;border-bottom-right-radius:3px}
.bub.arjun{background:var(--bx);border:1.5px solid #90CAF9;color:var(--b);align-self:flex-start;border-bottom-left-radius:3px}
.bn{font-size:9px;font-weight:800;opacity:.7;margin-bottom:1px;padding:0 12px}
.vo{background:rgba(0,0,0,.05);border-radius:var(--rs);padding:6px 10px;font-size:10px;font-weight:600;color:var(--md);font-style:italic;border-left:3px solid var(--br);margin-top:6px}
.inp{border:2.5px solid var(--br);border-radius:var(--rs);padding:10px 14px;font-family:var(--f);font-size:16px;font-weight:800;width:100%;outline:none;text-align:center;transition:border-color .2s;background:var(--wh)}
.inp:focus{border-color:var(--g)}
.inp.ok{border-color:var(--g);background:var(--gx)}
.inp.bad{border-color:var(--c);background:var(--cx);animation:shk .4s}
.scl{font-size:10px;font-weight:900;letter-spacing:1px;text-transform:uppercase;color:var(--mu);margin-bottom:5px}
.sbdg{display:flex;align-items:center;gap:3px;background:var(--gox);border:1.5px solid var(--go);border-radius:20px;padding:3px 9px;font-size:11px;font-weight:800;color:var(--a)}
.bnr{padding:9px 12px;border-radius:var(--rs);font-size:12px;font-weight:800;margin-bottom:8px;text-align:center;color:#fff}
.bnr.g{background:var(--g)}.bnr.c{background:var(--c)}.bnr.p{background:var(--p)}.bnr.a{background:var(--a)}
.rlc{border-radius:var(--r);padding:12px 14px;margin:7px 0;display:flex;align-items:center;gap:8px;font-weight:700;font-size:13px}
.rlg{background:linear-gradient(135deg,var(--gx),#C8E6C9);border-left:4px solid var(--g)}
.rlco{background:linear-gradient(135deg,var(--cx),#FFCDD2);border-left:4px solid var(--c)}
.rlp{background:linear-gradient(135deg,var(--px),#E1BEE7);border-left:4px solid var(--p)}
.rla{background:linear-gradient(135deg,var(--ax),#FFE0B2);border-left:4px solid var(--a)}
.ri{font-size:20px;flex-shrink:0}
.toast{position:absolute;top:62px;left:50%;transform:translateX(-50%);background:var(--dk);color:#fff;padding:8px 18px;border-radius:28px;font-size:12px;font-weight:700;z-index:300;opacity:0;transition:opacity .3s;pointer-events:none;white-space:nowrap}
.toast.g{background:var(--g)}.toast.r{background:var(--c)}.toast.on{opacity:1}
.dots{display:flex;gap:5px;justify-content:center;padding:5px 0}
.dot{width:6px;height:6px;border-radius:50%;background:var(--br);transition:background .3s}
.dot.on{background:var(--g)}
.pb2{height:4px;background:var(--br);border-radius:2px;margin:6px 0}
.pb2f{height:100%;border-radius:2px;background:linear-gradient(90deg,var(--g),var(--gl));transition:width .4s}
.mrow{display:grid;grid-template-columns:1fr 18px 1fr;gap:7px;align-items:center;margin-bottom:7px}
.mit{background:var(--wh);border:2px solid var(--br);border-radius:var(--rs);padding:9px;font-size:12px;font-weight:700;text-align:center;cursor:pointer;transition:all .2s;min-height:40px;display:flex;align-items:center;justify-content:center}
.mit.sel{border-color:var(--b);background:var(--bx);transform:scale(1.04)}
.mit.ok{border-color:var(--g);background:var(--gx);cursor:default}
.mit.bad{animation:shk .4s;border-color:var(--c)}
.jbtn{flex:1;background:var(--wh);border:2px solid var(--g);border-radius:var(--rs);padding:8px 4px;font-size:11px;font-weight:800;color:var(--g);cursor:pointer;min-height:40px;transition:all .15s}
.jbtn:disabled{opacity:.3;cursor:not-allowed}
.jbtn.dn{background:var(--g);color:#fff;border-color:var(--g)}
.jbtn.dnc{background:var(--c);color:#fff;border-color:var(--c)}
.jrow{display:flex;gap:7px;margin-top:8px;flex-wrap:wrap}
.ptbl{width:100%;border-collapse:collapse}
.ptbl th{background:var(--dk);color:#fff;padding:7px 5px;font-size:11px;font-weight:800}
.ptbl td{padding:8px 5px;font-size:12px;font-weight:700;text-align:center;border-bottom:1px solid var(--br)}
.ptbl .pre td{background:var(--cx)}
.ptbl .dis td{background:#f5f5f5;color:var(--mu)}
.ptbl .ulk td{background:var(--gx);animation:pop .3s}
.mcq{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-top:7px}
.mo{background:var(--wh);border:2px solid var(--br);border-radius:var(--rs);padding:10px;font-size:14px;font-weight:800;text-align:center;cursor:pointer;min-height:44px;display:flex;align-items:center;justify-content:center;transition:all .15s}
.mo:hover{border-color:var(--b);background:var(--bx)}
.mo.ok{border-color:var(--g);background:var(--gx);color:var(--gd)}
.mo.bad{border-color:var(--c);background:var(--cx);animation:shk .4s}
.sgg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin:8px 0}
.sgb{padding:15px;border-radius:var(--r);border:none;font-size:22px;font-weight:900;cursor:pointer;transition:all .15s}
.sgp{background:var(--gx);color:var(--gd)}.sgn{background:var(--cx);color:var(--c)}
.sgb:hover{transform:scale(1.04)}.sgb.ch{transform:scale(1.06);box-shadow:0 0 0 3px var(--g)}.sgb.chn{transform:scale(1.06);box-shadow:0 0 0 3px var(--c)}
.hc{display:inline-flex;align-items:center;gap:4px;background:var(--ax);border:1.5px solid #FFCC80;border-radius:20px;padding:4px 10px;font-size:10px;font-weight:700;color:var(--a);margin-top:7px}
.ccols{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px}
.cc{border-radius:var(--r);overflow:hidden;cursor:pointer;transition:transform .2s}.cc:hover{transform:scale(1.04)}
.cch{padding:9px 4px;text-align:center;font-size:10px;font-weight:800;color:#fff}
.ccb{padding:9px 5px;font-size:10px;font-weight:700;color:var(--dk);background:var(--wh)}
.ccr{font-size:14px;font-weight:900;margin:3px 0}
.bigrl{font-size:14px;font-weight:900;text-align:center;padding:14px;border-radius:var(--r);margin:9px 0;background:linear-gradient(135deg,var(--ax),var(--gox));border:2px solid var(--go)}
.proof{background:linear-gradient(135deg,var(--p),var(--pl));color:#fff;border-radius:var(--r);padding:14px;text-align:center;font-size:14px;font-weight:900;margin:9px 0;animation:pop .5s ease}
.sp{border-radius:var(--r);padding:12px;margin-bottom:8px;cursor:pointer;transition:transform .2s;display:flex;gap:10px;align-items:center}
.sp:hover{transform:scale(1.02)}
.gz{flex:1;display:flex;flex-direction:column;overflow:hidden;background:linear-gradient(180deg,#1a1a2e,#16213e);position:relative}
.fe{position:absolute;background:var(--wh);border:2px solid var(--br);border-radius:10px;padding:7px 12px;font-size:14px;font-weight:800;cursor:pointer;user-select:none}
.fe.sel{border-color:var(--go);background:var(--gox);box-shadow:0 0 14px rgba(249,168,37,.5);transform:scale(1.08)}
.gbins{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:10px}
.gbin{border-radius:var(--r);padding:14px 8px;text-align:center;cursor:pointer;transition:transform .15s;border:2px solid rgba(255,255,255,.2)}
.gbin:active{transform:scale(.97)}.gbin.pos{background:rgba(46,125,50,.85)}.gbin.neg{background:rgba(198,40,40,.85)}
.gbs{font-size:32px;font-weight:900;color:#fff}.gbl{font-size:11px;font-weight:700;color:rgba(255,255,255,.8)}
.tbar{height:5px;background:rgba(255,255,255,.15);border-radius:3px;margin:5px 10px}
.tbf{height:100%;background:var(--go);border-radius:3px;transition:width .1s linear}
.cpc{position:absolute;width:7px;height:7px;border-radius:2px;animation:cfl 1.2s ease forwards}
.mb{padding:6px 12px;display:flex;justify-content:space-between;align-items:center}
.str{display:flex;justify-content:center;gap:8px;font-size:40px;margin:10px 0}
.si{border:2px solid var(--br);border-radius:var(--rs);padding:9px 12px;font-family:var(--f);font-size:13px;font-weight:700;width:100%;outline:none;cursor:pointer;background:var(--wh)}
.mnl{margin:8px 0;background:var(--wh);border-radius:var(--rs);padding:10px 6px 6px;border:1.5px solid var(--br)}
@keyframes pop{from{opacity:0;transform:scale(.7)}to{opacity:1;transform:scale(1)}}
@keyframes shk{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-5px)}40%,80%{transform:translateX(5px)}}
@keyframes pls{0%,100%{box-shadow:0 0 0 0 rgba(46,125,50,.4)}50%{box-shadow:0 0 0 8px rgba(46,125,50,0)}}
@keyframes su{0%{transform:translateY(8px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes cfl{0%{opacity:1;transform:translateY(0) rotate(0)}100%{opacity:0;transform:translateY(250px) rotate(720deg)}}
@keyframes arcD{from{stroke-dashoffset:200}to{stroke-dashoffset:0}}
@keyframes bnce{0%,100%{transform:translateY(0)}40%{transform:translateY(-10px)}70%{transform:translateY(-4px)}}
.su{animation:su .4s ease forwards}
@media(max-width:420px){.phone{width:100%;height:100vh;border-radius:0;box-shadow:none}}
</style>
</head>
<body>
<div id="app"><div class="phone" id="phone"><div id="toast" class="toast"></div><div id="scr"></div></div></div>
<script>
(function(){
'use strict';
var ST={
  screen:0,s1:{idx:0},
  s3:{q1Done:false,q1Hints:0,q2Done:{},selLeft:null,stars:0},
  s5:{jumps:0,q2Att:0,q2Hint:'',stars:0},
  s7:{jumps:0,q2Att:0,q2Hint:'',bonusDone:false,bonusSel:'',bonusHint:'',stars:0},
  s8:{done:[],attempts:{},hints:{}},
  s9:{q1Done:false,q2Att:0,q2Hint:'',q3Hint:'',stars:0},
  s10:{expanded:-1},
  s11:{curQ:0,signPicked:null,signCorrect:null,valAtt:0,valHint:'',hintMsg:'',results:[],done:false},
  s12:{round:1,score:0}
};

var phone=document.getElementById('phone'),toastEl=document.getElementById('toast');

function toast(msg,cls,dur){
  dur=dur||2000;toastEl.textContent=msg;
  toastEl.className='toast '+(cls||'g')+' on';
  setTimeout(function(){toastEl.className='toast';},dur);
}

function confetti(el){
  var cols=['#4CAF50','#EF5350','#AB47BC','#F9A825','#42A5F5','#FFCA28'];
  for(var i=0;i<24;i++){
    var c=document.createElement('div');c.className='cpc';
    c.style.cssText='left:'+Math.random()*100+'%;top:'+(Math.random()*30+25)+'%;background:'+cols[i%6]+';animation-delay:'+Math.random()*.4+'s;animation-duration:'+(0.8+Math.random()*.7)+'s;';
    el.appendChild(c);setTimeout((function(cc){return function(){try{cc.remove();}catch(e){}};})(c),1800);
  }
}

function nl(opts){
  var min=opts.min,max=opts.max,arcs=opts.arcs||[],color=opts.color||'#2E7D32',land=opts.land,W=320,PL=18,PR=18,H=78;
  var range=max-min;var sx=function(v){return PL+(v-min)/range*(W-PL-PR);};var inner='';
  inner+='<line x1="'+PL+'" y1="52" x2="'+(W-PR)+'" y2="52" stroke="#424242" stroke-width="1.8" stroke-linecap="round"/>';
  var st2=range<=20?1:2;
  for(var iv=min;iv<=max;iv+=st2){var xi=sx(iv);inner+='<line x1="'+xi+'" y1="47" x2="'+xi+'" y2="57" stroke="#424242" stroke-width="1.2"/><text x="'+xi+'" y="70" font-size="8" font-weight="700" fill="#757575" text-anchor="middle" font-family="Nunito,sans-serif">'+iv+'</text>';}
  arcs.forEach(function(a,ai){
    var x1=sx(a.from),x2=sx(a.to),mid=(x1+x2)/2,aH=26+ai*4,ac=a.color||color;
    inner+='<path d="M'+x1+',52 L'+x1+','+(52-aH)+' L'+x2+','+(52-aH)+' L'+x2+',52" fill="none" stroke="'+ac+'" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"'+(a.an?' stroke-dasharray="200" stroke-dashoffset="200" style="animation:arcD 0.5s '+(a.dl||0)+'s ease forwards;"':'')+'/>';
    inner+='<text x="'+mid+'" y="'+(52-aH-4)+'" font-size="9" font-weight="800" fill="'+ac+'" text-anchor="middle" font-family="Nunito,sans-serif">'+a.label+'</text>';
  });
  if(land!==undefined&&land!==null){var lx=sx(land);inner+='<circle cx="'+lx+'" cy="52" r="7" fill="'+color+'" opacity="0.9"/><text x="'+lx+'" y="55" font-size="8" fill="#fff" font-weight="900" text-anchor="middle" font-family="Nunito,sans-serif">'+land+'</text>';}
  return '<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="overflow:visible">'+inner+'</svg>';
}

function navH(t,b){
  return '<div class="nav">'+(ST.screen>0?'<button class="btn btns btnsm" onclick="NAV('+(ST.screen-1)+')">&#8592; Back</button>':'<div style="width:50px"></div>')+'<div class="ntl">'+t+'</div><div class="nbdg">'+b+'</div></div>';
}
function pbH(cur,tot){
  return '<div class="pbw"><div class="pb"><div class="pbf" style="width:'+(cur/tot*100).toFixed(0)+'%"></div></div><div class="pbl">'+cur+'/'+tot+'</div></div>';
}

window.NAV=function(idx){ST.screen=idx;render();};

var scs=[s1,s2,s3,s4,s5,s6,s7,s8,s9,s10,s11,s12,s13];
function render(){
  var el=document.getElementById('scr');
  el.innerHTML='';
  scs[ST.screen](el);
}

function s1(el){
  var dlgs=[
    {w:'arjun',t:'Ria, I am stuck on homework. It says (&#8722;3)&times;(&#8722;4). How do you multiply two negative numbers?'},
    {w:'ria',t:'Great question! But first &#8212; do you remember what multiplication actually means?'},
    {w:'arjun',t:'Just... multiplying two numbers?'},
    {w:'ria',t:'There is more! Multiplication is repeated addition. Let me show you with a simple example!'},
  ];
  var vos=[
    '&#8220;Arjun: Ria, main homework mein stuck hoon. (&#8722;3)&times;(&#8722;4) &#8212; do negative numbers multiply kaise hote hain?&#8221;',
    '&#8220;Ria: Acha sawal! Lekin pehle &#8212; multiplication ka matlab kya hota hai, yaad hai?&#8221;',
    '&#8220;Arjun: Bas... do numbers multiply karna?&#8221;',
    '&#8220;Ria: Isse zyada hai! Multiplication matlab baar baar jodna!&#8221;',
  ];
  el.innerHTML=navH('Ria &amp; Arjun','S1 &middot; Concrete')+pbH(1,13)+
    '<div class="scroll" id="s1b">'+
      '<div class="char-row" style="margin-bottom:8px;">'+
        '<div class="char"><div class="cb ria">&#128522;</div><div class="cl">Ria</div></div>'+
        '<div style="font-size:22px;font-weight:900;color:var(--mu);">VS</div>'+
        '<div class="char"><div class="cb arjun">&#128533;</div><div class="cl">Arjun</div></div>'+
      '</div>'+
      '<div class="card" style="background:linear-gradient(135deg,#E8F5E9,#E3F2FD);border:none;margin-bottom:8px;">'+
        '<div style="font-size:10px;font-weight:800;color:var(--mu);letter-spacing:1px;margin-bottom:5px;">&#128205; Park bench, after school</div>'+
        '<div style="font-size:12px;color:var(--md);">Arjun is puzzled about homework: <strong style="color:var(--p);">(&#8722;3)&times;(&#8722;4)=?</strong></div>'+
      '</div>'+
      '<div class="bubs" id="bubc"></div>'+
      '<div style="height:70px"></div>'+
    '</div>'+
    '<div class="bbar">'+
      '<div class="dots" id="s1d" style="margin-bottom:7px;"></div>'+
      '<button class="btn btnp pls" id="s1btn">Next &#8594;</button>'+
    '</div>';
  var idx=ST.s1.idx;
  function rb(){
    var bc=document.getElementById('bubc');if(!bc)return;
    var h='';
    for(var i=0;i<=idx;i++){var d=dlgs[i];h+='<div style="display:flex;flex-direction:column;align-items:'+(d.w==='ria'?'flex-end':'flex-start')+'"><div class="bn" style="color:'+(d.w==='ria'?'var(--g)':'var(--b)')+';">'+(d.w==='ria'?'Ria':'Arjun')+'</div><div class="bub '+d.w+'">'+d.t+'</div></div>';}
    if(idx<dlgs.length-1)h+='<div class="vo">'+vos[idx]+'</div>';
    bc.innerHTML=h;
    var dots=document.getElementById('s1d');
    if(dots)dots.innerHTML=dlgs.map(function(_,i){return '<div class="dot'+(i<=idx?' on':'')+'"></div>';}).join('');
    var btn=document.getElementById('s1btn');if(!btn)return;
    if(idx>=dlgs.length-1){btn.innerHTML="Let's Begin! &#8594;";btn.classList.remove('pls');btn.onclick=function(){ST.screen=1;render();};}
    else{btn.innerHTML='Next &#8594;';btn.onclick=function(){idx++;ST.s1.idx=idx;rb();};}
    var sb=document.getElementById('s1b');if(sb)setTimeout(function(){sb.scrollTop=sb.scrollHeight;},80);
  }
  document.getElementById('s1btn').onclick=function(){idx++;ST.s1.idx=idx;rb();};
  rb();
}

function s2(el){
  var ex2=false;
