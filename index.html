<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SCORM Module</title>
<style>
body{font-family:Arial;margin:0;background:#f4f6fb}
.container{max-width:1000px;margin:auto;padding:20px}
.screen{display:none;background:#fff;padding:20px;border-radius:12px}
.screen.active{display:block}
button{padding:10px 16px;border:none;border-radius:8px;background:#2563eb;color:#fff;cursor:pointer}
.nav{display:flex;justify-content:space-between;margin-top:20px}
.header{font-size:22px;font-weight:bold;margin-bottom:10px}
</style>
<script>
// basic SCORM API wrapper
function initSCORM(){
 try{
   var api = window.parent.API || window.parent.API_1484_11;
   if(api){console.log("SCORM connected")}
 }catch(e){}
}
window.onload=initSCORM;
</script>
</head>
<body>
<div class="container">

<div class="screen active">
<div class="header">Welcome</div>
<p>Multiplication of Integers Module</p>
<div class="nav"><button disabled>Prev</button><button onclick="next()">Next</button></div>
</div>

<div class="screen">
<div class="header">Concept</div>
<p>Multiplication = Repeated Addition</p>
<div class="nav"><button onclick="prev()">Prev</button><button onclick="next()">Next</button></div>
</div>

<div class="screen">
<div class="header">Practice</div>
<p>5 × 3 = ?</p>
<input id="q"><button onclick="check()">Check</button>
<p id="r"></p>
<div class="nav"><button onclick="prev()">Prev</button><button onclick="next()">Next</button></div>
</div>

<div class="screen">
<div class="header">Summary</div>
<p>Same signs → Positive | Different → Negative</p>
<div class="nav"><button onclick="prev()">Prev</button><button disabled>End</button></div>
</div>

</div>

<script>
let i=0;let s=document.querySelectorAll('.screen');
function show(x){s.forEach(e=>e.classList.remove('active'));s[x].classList.add('active')}
function next(){if(i<s.length-1){i++;show(i)}}
function prev(){if(i>0){i--;show(i)}}
function check(){r.innerText = q.value==15?"Correct":"Try again"}
</script>

</body>
</html>
